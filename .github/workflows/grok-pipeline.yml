name: 🚀 GrokX Forge Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: pip install -r requirements.txt
      - run: python -m pytest || echo "No tests yet - coming soon!"
      - name: Notify Grok
        run: echo "Pipeline passed! Ready for next feature from Grok."
